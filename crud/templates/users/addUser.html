{% extends "layout/base.html" %}

{% block 'title' %} Add User {% endblock 'title' %}

{% block 'content' %}
{% include "includes/sidebar.html" %}
{% include "includes/ToastMessage.html" %}

<div class="p-2 sm:ml-64 mt-16 md:mt-14">
    <div class="mx-auto w-full md:w-2/3 mb-2">
        <form action="/users/add" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="bg-white border border-gray-300 rounded-2xl p-10 shadow-2xl">
                <div class="grid grid-cols-2 gap-x-6 gap-y-4">
                    <div>
                        <label for="full_name" class="block text-sm font-medium mb-2">Full Name</label>
                        <input type="text" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="full_name" id="full_name" required />
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium mb-2">Email</label>
                        <input type="email" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="email" id="email" required />
                    </div>
                    <div>
                        <label for="gender" class="block text-sm font-medium mb-2">Gender</label>
                        <select name="gender" id="gender" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" required>
                        <option value="">Select Gender</option>
                            {% for gender in genders %}
                                <option value="{{ gender.gender_id }}">{{ gender.gender }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="username" class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="username" id="username" required />
                    </div>
                    <div>
                        <label for="birth_date" class="block text-sm font-medium mb-2">Birth Date</label>
                        <input type="date" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="birth_date" id="birth_date" required />
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="password" id="password" required />
                    </div>
                    
                    <div>
                        <label for="contact_number" class="block text-sm font-medium mb-2">Contact Number</label>
                        <input type="text" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="contact_number" id="contact_number" required />
                    </div>
                    <div>
                        <label for="confirm_password" class="block text-sm font-medium mb-2">Confirm Password</label>
                        <input type="password" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="confirm_password" id="confirm_password" required />
                    </div>
                </div>
                <div>
                    <label for="address" class="block text-sm font-medium mb-2">Address</label>
                    <input type="text" class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="address" id="address" required />
                </div>
                <div>
                    <label for="profile_pic" class="cursor-pointer flex flex-col items-center mt-4 mb-4">
                        {% if user.profile_pic %}
                            <img src="{{ user.profile_pic.url }}" alt="Current Profile Picture" id="preview_img" class="w-24 h-24 rounded-full object-cover mb-2 border-2 border-gray-300 shadow-md ring-2 ring-offset-2 ring-gray-200"/>
                        {% else %}
                            <img src="upload-icon.png" alt="Upload" id="preview_img" class="w-16 h-16 mb-2 border-2 border-dashed border-gray-300 shadow-sm rounded-full p-1"/>
                        {% endif %}
                        <span class="text-sm text-gray-500">Choose a Profile Picture</span>
                    </label>
                    <input type="file" name="profile_pic" id="profile_pic" class="hidden" accept="image/*" />
                </div>
                    <div class="col-span-2 flex justify-center mt-2">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-sm font-medium text-white px-3 py-2.5 rounded-sm shadow-sm cursor-pointer">
                            Add User
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div> 
<script>
  const password = document.getElementById('password');
  const confirmPassword = document.getElementById('confirm_password');
  const passwordError = document.getElementById('password_error');
  const passwordSuccess = document.getElementById('password_success');
  const submitBtn = document.getElementById('submit_btn');

  confirmPassword.addEventListener('keyup', function () {
    if (confirmPassword.value === '') {
      passwordError.classList.add('hidden');
      passwordSuccess.classList.add('hidden');
    } else if (password.value !== confirmPassword.value) {
      passwordError.classList.remove('hidden');
      passwordSuccess.classList.add('hidden');
      confirmPassword.classList.add('border-red-500');
      confirmPassword.classList.remove('border-gray-300');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
    } else {
      passwordError.classList.add('hidden');
      passwordSuccess.classList.remove('hidden');
      confirmPassword.classList.remove('border-red-500');
      confirmPassword.classList.add('border-gray-300');
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
  });
    document.getElementById('profile_pic').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview_img').src = e.target.result;
                document.getElementById('preview_img').classList.add('w-24', 'h-24', 'rounded-full', 'object-cover');
            }
            reader.readAsDataURL(file);
        }
    });
</script>

{% endblock 'content' %}
