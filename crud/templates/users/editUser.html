{% extends "layout/base.html" %}

{% block 'title' %} Edit User Page {% endblock 'title' %}

{% block 'content' %}
{% include "includes/sidebar.html" %}
{% include "includes/ToastMessage.html" %}
<div class="p-2 sm:ml-64 mt-16 md:mt-14">
  <form action="/users/edit/{{ user.user_id }}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mx-auto w-full md:w-1/3 mb-2">
      <label for="user" class="block text-sm font-medium mb-2">Edit Profile</label>
      <div class='mb-4'>
            <label for="profile_pic" class="cursor-pointer flex flex-col items-center">
                {% if user.profile_pic %}
                    <img src="{{ user.profile_pic.url }}" alt="Current Profile Picture" id="preview_img" class="w-24 h-24 rounded-full object-cover mb-2 border border-gray-300"/>
                {% else %}
                    <img src="upload-icon.png" alt="Upload" id="preview_img" class="w-16 h-16 mb-2"/>
                {% endif %}
                <span class="text-sm text-gray-500">Click to change photo</span>
            </label>
            <input type="file" name="profile_pic" id="profile_pic" class="hidden" accept="image/*" />
      </div>
      <div class="flex justify-end">
        <a href="/users/list" class="bg-white text-sm font-medium text-black px-3 py-2.5 mr-1 rounded-sm shadow-sm cursor-pointer hover:bg-gray-100 hover:outline-none">Back</a>
        <button type="submit" class="bg-green-600 text-sm font-medium text-white px-3 py-2.5 rounded-sm shadow-sm cursor-pointer hover:bg-green-700 hover:outline-none">Save Profile</button>
      </div>
    </div>
  </form>
</div>
<script>
    document.getElementById('profile_pic').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview_img').src = e.target.result;
                document.getElementById('preview_img').classList.add('w-24', 'h-24', 'rounded-full', 'object-cover');
            }
            reader.readAsDataURL(file);
        }
    });
</script>
{% endblock 'content' %}
