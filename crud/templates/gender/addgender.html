{% extends "layout/base.html" %}

{% block 'title' %} Add Gender Page {% endblock 'title' %}

{% block 'content' %}
{% include "includes/sidebar.html" %}

<!-- Main Wrapper -->
<div class="sm:ml-64 min-h-screen bg-white flex flex-col antialiased">
  
  <div class="p-6 md:p-12 mt-16 grow flex justify-center items-start">
    
    <!-- Form Card -->
    <div class="w-full max-w-5xl bg-white border border-gray-800 rounded-2xl p-10 shadow-2xl">

      <form action="/gender/add" method="post" class="space-y-12">
        {% csrf_token %}
        
        <!-- Input Row -->
        <div class="flex justify-center">
          <div class="w-full max-w-md">
            <label for="gender" class="text-[14px] font-bold text-black uppercase tracking-widest block mb-4 ml-1">
              Gender Name
            </label>
            <input 
              type="text" 
              name="gender" 
              id="gender" 
              placeholder="e.g. Male, Female, Non-binary"
              class="bg-white border border-gray-700 text-black text-m rounded-xl block w-full p-4 focus:ring-2 focus:ring-cyan-500/40 focus:border-cyan-500 outline-none transition-all placeholder:text-gray-700 shadow-inner"
              required 
            />
          </div>
        </div>

        <!-- Action Area (FIXED HOVER EFFECTS) -->
        <div class="pt-10 mt-20 border-t border-gray-800/50 flex justify-center">
          <button type="submit" 
            class="group relative flex items-center justify-center w-full max-w-xs py-4 bg-green-600 rounded-xl transition-all duration-300 
                   hover:bg-green-500 hover:scale-[1.02] hover:shadow-[0_0_40px_8px_rgba(34,197,94,0.3)] 
                   active:scale-95 overflow-hidden">
            
            <!-- Shimmer Overlay: Using standard CSS animation via style tag below -->
            <div class="absolute inset-0 bg-linear-to-r from-transparent via-white/30 to-transparent -translate-x-full shimmer-effect"></div>
            
            <div class="relative flex items-center gap-3">
              <svg class="w-6 h-6 stroke-white fill-none transition-transform duration-300 group-hover:rotate-6 group-hover:scale-110" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
              </svg>
              
              <span class="text-sm font-black uppercase tracking-widest text-white transition-colors duration-300 group-hover:text-white">
                Save Gender
              </span>
            </div>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<style>
  /* Global Overrides */
  body, html { background-color: #0b0f1a !important; margin: 0; padding: 0; }
  
  /* Input Focus Lift */
  input:focus {
    transform: translateY(-1px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
  }

  /* Fixed Shimmer Logic */
  .shimmer-effect {
    transition: transform 0.6s ease-in-out;
  }

  /* When the BUTTON (group) is hovered, trigger the shimmer div */
  .group:hover .shimmer-effect {
    animation: simple-shimmer 0.8s forwards;
  }

  @keyframes simple-shimmer {
    0% { transform: translateX(-100%) skewX(-15deg); }
    100% { transform: translateX(200%) skewX(-15deg); }
  }
</style>
{% endblock 'content' %}
