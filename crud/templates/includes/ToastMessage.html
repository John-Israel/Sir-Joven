{% load static %}

{% if messages %}
<div class="fixed top-5 right-5 z-100 flex flex-col gap-3">
    {% for message in messages %}
    <div id="toast-{{ forloop.counter }}" class="flex items-center w-full max-w-xs p-4 bg-[#0D1117]/90 border border-white/10 backdrop-blur-xl rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] animate-slide-in" role="alert">
        <!-- Icon -->
        <div class="inline-flex items-center justify-center shrink-0 w-10 h-10 text-cyan-400 bg-cyan-400/10 rounded-xl shadow-inner">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <!-- Text -->
        <div class="ms-4 text-xs font-black uppercase tracking-widest text-white/90">{{ message }}</div>
        <!-- Close -->
        <button type="button" onclick="document.getElementById('toast-{{ forloop.counter }}').remove()" class="ms-auto -mx-1.5 bg-transparent text-slate-500 hover:text-white transition-colors p-1.5 inline-flex items-center justify-center h-8 w-8 rounded-lg">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}

<style>
@keyframes slide-in {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
.animate-slide-in { animation: slide-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
</style>
